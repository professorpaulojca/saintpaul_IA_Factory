services:
  db:
    image: postgres:16-alpine
    container_name: academy-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: academy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - academy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academy_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  academy_pgdata:
